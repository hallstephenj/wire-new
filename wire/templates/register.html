<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — EDROWIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" media="print" onload="this.media='all'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0a; color: #cccccc;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 13px; min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.container { width: 100%; max-width: 360px; padding: 32px 24px; }
.logo { font-size: 28px; font-weight: 700; color: #ffb000; letter-spacing: 4px; margin-bottom: 8px; text-align: center; }
.tagline { text-align: center; font-size: 11px; color: #555; margin-bottom: 32px; letter-spacing: 1px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #666; margin-bottom: 6px; }
input {
    width: 100%; background: #111; border: 1px solid #333; color: #ccc;
    font-family: inherit; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.15s;
}
input:focus { border-color: #ffb000; }
.btn {
    width: 100%; background: #ffb000; color: #0a0a0a; border: none;
    font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 8px; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.error { color: #e05555; font-size: 11px; margin-top: 12px; text-align: center; min-height: 16px; }
.success { color: #4a9e4a; font-size: 11px; margin-top: 12px; text-align: center; }
.footer-links { margin-top: 24px; text-align: center; font-size: 11px; color: #555; }
.footer-links a { color: #666; text-decoration: none; }
.footer-links a:hover { color: #ffb000; }
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="container">
    <div class="logo">EDROWIRE<span style="animation:blink 1s step-end infinite;color:#ffb000;">▌</span></div>
    <div class="tagline">YOUR WIRE. YOUR SIGNAL.</div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="8+ characters">
    </div>
    <button class="btn" id="register-btn" onclick="doRegister()">Create Account</button>
    <div class="error" id="error-msg"></div>
    <div id="success-msg" class="success" style="display:none;">Check your email to confirm your account.</div>
    <div class="footer-links">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient('{{SUPABASE_URL}}', '{{SUPABASE_PUBLISHABLE_KEY}}');

window.doRegister = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('register-btn');
    const err = document.getElementById('error-msg');
    err.textContent = '';

    if (!email || !password) { err.textContent = 'Email and password required.'; return; }
    if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }

    btn.disabled = true;
    btn.textContent = 'CREATING ACCOUNT...';

    const { data, error } = await supabase.auth.signUp({ email, password });

    if (error) {
        err.textContent = error.message || 'Registration failed.';
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT';
        return;
    }

    // Email confirmation required — session will be null
    if (!data.session) {
        document.getElementById('success-msg').style.display = 'block';
        btn.textContent = 'CHECK YOUR EMAIL';
        return;
    }

    // No email confirmation — signed in immediately, set cookie then redirect
    const session = data.session;
    document.cookie = `sb-access-token=${session.access_token}; Max-Age=${session.expires_in || 3600}; path=/; SameSite=Lax`;
    await fetch('/api/user/me', { method: 'POST' });
    window.location.href = '/onboarding';
};

document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doRegister();
});
</script>
</body>
</html>
